<!DOCTYPE html>
<html>
<head>
  <title>HGV Workshop Finder</title>
  <meta charset="UTF-8">
  <style>
    #login-overlay {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background: rgba(0,0,0,0.6);
      display: none;
      justify-content: center;
      align-items: center;
      z-index: 2000;
    }
    #login-box {
      background: white;
      padding: 20px;
      width: 300px;
      border-radius: 10px;
      box-shadow: 0 0 20px rgba(0,0,0,0.4);
      text-align: center;
    }
    #login-box input {
      width: 100%;
      padding: 8px;
      margin-top: 8px;
    }
    #login-box button {
      width: 100%;
      padding: 10px;
      margin-top: 12px;
    }
  </style>
</head>

<body>

<h2>HGV Workshop Finder</h2>

<input id="postcode" placeholder="Enter postcode">
<button onclick="findWorkshops()">Search</button>

<div id="map" style="height:500px; margin-top:20px;"></div>
<div id="workshop-list" style="margin-top:20px;"></div>

<hr>
<h3>Workshop Editor</h3>

<input id="w-id" type="hidden">

<label>Name:</label><br>
<input id="w-name"><br><br>

<label>Latitude:</label><br>
<input id="w-lat"><br><br>

<label>Longitude:</label><br>
<input id="w-lng"><br><br>

<label>Main Phone:</label><br>
<input id="w-phone-main"><br><br>

<label>Mobile Phone:</label><br>
<input id="w-phone-mobile"><br><br>

<label>Out of Hours:</label><br>
<input id="w-phone-out"><br><br>

<label>Email:</label><br>
<input id="w-email"><br><br>

<button onclick="saveWorkshop()">Save Workshop</button>
<button onclick="resetToDefaults()">Reset All Workshops</button>

<hr>

<h3>Bulk Import</h3>
<textarea id="bulk-input" style="width:100%;height:120px;" placeholder="name,lat,lng,phoneMain,phoneMobile,phoneOutHours,email"></textarea><br>
<button onclick="bulkImport()">Bulk Import</button>

<div id="login-overlay">
  <div id="login-box">
    <h3>Admin Login Required</h3>
    <input id="login-email" type="email" placeholder="Email">
    <input id="login-pass" type="password" placeholder="Password">
    <button onclick="performLogin()">Login</button>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
import { 
  getDatabase, ref, set, push, onValue, update, remove 
} from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";
import {
  getAuth, signInWithEmailAndPassword, onAuthStateChanged
} from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyAkm-NcybEuigI1PIR0UNk7aeNKLasQEZw",
  authDomain: "hgv-workshop-finder.firebaseapp.com",
  databaseURL: "https://hgv-workshop-finder-default-rtdb.europe-west1.firebasedatabase.app",
  projectId: "hgv-workshop-finder",
  storageBucket: "hgv-workshop-finder.appspot.com",
  messagingSenderId: "540661085613",
  appId: "1:540661085613:web:199992f2ad1c4f5cb29d24"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);
const auth = getAuth(app);

const ADMIN_EMAIL = "breakdown@advancedbreakdownservicesuk.co.uk";

let workshops = {};
let map;
let workshopMarkers = [];
let breakdownMarker = null;
let userIsAdmin = false;

onAuthStateChanged(auth, (user) => {
  userIsAdmin = !!(user && user.email === ADMIN_EMAIL);
});

function requireAdmin() {
  if (!userIsAdmin) {
    document.getElementById("login-overlay").style.display = "flex";
    return false;
  }
  return true;
}

window.performLogin = function() {
  const email = document.getElementById("login-email").value.trim();
  const pass = document.getElementById("login-pass").value.trim();

  signInWithEmailAndPassword(auth, email, pass)
    .then(() => {
      document.getElementById("login-overlay").style.display = "none";
      alert("Logged in as admin.");
    })
    .catch(() => alert("Login failed."));
};

const workshopsRef = ref(db, "workshops");

onValue(workshopsRef, (snapshot) => {
  workshops = snapshot.val() || {};
  refreshWorkshopList();
  refreshWorkshopMarkers();
});

window.initMap = function() {
  map = new google.maps.Map(document.getElementById("map"), {
    center: { lat: 54.5, lng: -3 },
    zoom: 6,
  });

  refreshWorkshopMarkers();
  refreshWorkshopList();
};

function refreshWorkshopMarkers() {
  workshopMarkers.forEach(m => m.setMap(null));
  workshopMarkers = [];

  Object.entries(workshops).forEach(([id, w]) => {
    const marker = new google.maps.Marker({
      position: { lat: w.lat, lng: w.lng },
      map,
      title: w.name,
      icon: "https://maps.google.com/mapfiles/ms/icons/green-dot.png"
    });

    const info = new google.maps.InfoWindow({
      content: `
        <strong>${w.name}</strong><br><br>
        <b>Main:</b> ${w.phoneMain || "N/A"}<br>
        <b>Mobile:</b> ${w.phoneMobile || "N/A"}<br>
        <b>Out of hours:</b> ${w.phoneOutHours || "N/A"}<br>
        <b>Email:</b> ${w.email || "N/A"}<br>
      `
    });

    marker.addListener("click", () => info.open(map, marker));
    workshopMarkers.push(marker);
  });
}

function refreshWorkshopList() {
  const container = document.getElementById("workshop-list");
  if (!container) return;
  container.innerHTML = "";

  Object.entries(workshops).forEach(([id, w]) => {
    const div = document.createElement("div");
    div.innerHTML = `
      <strong>${w.name}</strong><br>
      Lat: ${w.lat}, Lng: ${w.lng}<br>
      <button onclick="zoomToWorkshop('${id}')">Zoom</button>
      <button onclick="editWorkshop('${id}')">Edit</button>
      <button onclick="deleteWorkshop('${id}')">Delete</button>
    `;
    container.appendChild(div);
  });
}

window.zoomToWorkshop = function(id) {
  const w = workshops[id];
  if (!w) return;
  map.setCenter({ lat: w.lat, lng: w.lng });
  map.setZoom(15);
};

window.editWorkshop = function(id) {
  if (!requireAdmin()) return;

  const w = workshops[id];
  if (!w) return;

  document.getElementById("w-id").value = id;
  document.getElementById("w-name").value = w.name;
  document.getElementById("w-lat").value = w.lat;
  document.getElementById("w-lng").value = w.lng;
  document.getElementById("w-phone-main").value = w.phoneMain || "";
  document.getElementById("w-phone-mobile").value = w.phoneMobile || "";
  document.getElementById("w-phone-out").value = w.phoneOutHours || "";
  document.getElementById("w-email").value = w.email || "";
};

window.saveWorkshop = function() {
  if (!requireAdmin()) return;

  const id = document.getElementById("w-id").value.trim();
  const name = document.getElementById("w-name").value.trim();
  const lat = parseFloat(document.getElementById("w-lat").value.trim());
  const lng = parseFloat(document.getElementById("w-lng").value.trim());
  const phoneMain = document.getElementById("w-phone-main").value.trim();
  const phoneMobile = document.getElementById("w-phone-mobile").value.trim();
  const phoneOut = document.getElementById("w-phone-out").value.trim();
  const email = document.getElementById("w-email").value.trim();

  if (!name || isNaN(lat) || isNaN(lng)) {
    alert("Please enter a name, latitude and longitude.");
    return;
  }

  const data = { name, lat, lng, phoneMain, phoneMobile, phoneOutHours: phoneOut, email };

  if (id) {
    update(ref(db, "workshops/" + id), data);
  } else {
    const newRef = push(workshopsRef);
    set(newRef, data);
  }

  clearWorkshopForm();
};

window.deleteWorkshop = function(id) {
  if (!requireAdmin()) return;
  if (!confirm("Delete this workshop?")) return;
  remove(ref(db, "workshops/" + id));
};

window.bulkImport = function() {
  if (!requireAdmin()) return;

  const text = document.getElementById("bulk-input").value.trim();
  if (!text) {
    alert("Paste some workshop data first.");
    return;
  }

  const lines = text.split("\n");
  lines.forEach(line => {
    const p = line.split(",");
    if (p.length < 3) return;

    const data = {
      name: p[0].trim(),
      lat: parseFloat(p[1]),
      lng: parseFloat(p[2]),
      phoneMain: p[3] || "",
      phoneMobile: p[4] || "",
      phoneOutHours: p[5] || "",
      email: p[6] || ""
    };

    const newRef = push(workshopsRef);
    set(newRef, data);
  });

  alert("Bulk import complete.");
};

window.resetToDefaults = function() {
  if (!requireAdmin()) return;
  if (!confirm("Reset ALL workshops?")) return;
  set(workshopsRef, {});
};

function clearWorkshopForm() {
  document.getElementById("w-id").value = "";
  document.getElementById("w-name").value = "";
  document.getElementById("w-lat").value = "";
  document.getElementById("w-lng").value = "";
  document.getElementById("w-phone-main").value = "";
  document.getElementById("w-phone-mobile").value = "";
  document.getElementById("w-phone-out").value = "";
  document.getElementById("w-email").value = "";
}

window.findWorkshops = function() {
  const postcode = document.getElementById("postcode").value.trim();
  if (!postcode) {
    alert("Enter a postcode.");
    return;
  }

  fetch(`https://maps.googleapis.com/maps/api/geocode/json?address=${encodeURIComponent(postcode)}&region=uk&key=AIzaSyAkm-NcybEuigI1PIR0UNk7aeNKLasQEZw`)
    .then(res => res.json())
    .then(data => {
      if (!data.results || !data.results.length) {
        alert("Postcode not found.");
        return;
      }

      const loc = data.results[0].geometry.location;

      if (breakdownMarker) breakdownMarker.setMap(null);
      breakdownMarker = new google.maps.Marker({
        position: loc,
        map,
        title: "Breakdown location",
        icon: "https://maps.google.com/mapfiles/ms/icons/red-dot.png"
      });

      map.setCenter(loc);
      map.setZoom(11);

      const sorted = Object.entries(workshops)
        .map(([id, w]) => ({
          id,
          ...w,
          distanceKm: haversine(loc.lat, loc.lng, w.lat, w.lng)
        }))
        .sort((a, b) => a.distanceKm - b.distanceKm)
        .slice(0, 20);

      renderWorkshopMarkers(sorted);
      renderWorkshopList(sorted);
    })
    .catch(() => alert("Geocoding failed."));
};

function haversine(lat1, lon1, lat2, lon2) {
  const R = 6371;
  const dLat = (lat2 - lat1) * Math.PI / 180;
  const dLon = (lon2 - lon1) * Math.PI / 180;
  const a =
    Math.sin(dLat / 2) ** 2 +
    Math.cos(lat1 * Math.PI / 180) *
    Math.cos(lat2 * Math.PI / 180) *
    Math.sin(dLon / 2) ** 2;
  return R * (2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a)));
}

window.addEventListener("load", () => {
  if (window.google && window.google.maps) {
    initMap();
  } else {
    const interval = setInterval(() => {
      if (window.google && window.google.maps) {
        clearInterval(interval);
        initMap();
      }
    }, 200);
  }
});
</script>

<script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyAkm-NcybEuigI1PIR0UNk7aeNKLasQEZw" async defer></script>

</body>
</html>

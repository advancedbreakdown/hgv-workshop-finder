<!DOCTYPE html>
<html>
<head>
  <title>HGV Workshop Finder</title>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>
    body { margin: 0; font-family: sans-serif; }
    #map { height: 100vh; width: 100%; }

    #panel {
      position: absolute; top: 10px; left: 10px; z-index: 1000;
      background: #fff; padding: 10px; border-radius: 10px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.25); width: 320px;
      max-height: 90vh; overflow-y: auto; font-size: 14px;
    }

    @media (max-width: 768px) {
      #panel { position: static; width: 100%; box-shadow: none; border-radius: 0; }
      #map { height: calc(100vh - 260px); }
    }

    #panel input, #panel button, #panel textarea {
      width: 100%; margin-top: 4px; margin-bottom: 6px; padding: 6px;
      box-sizing: border-box; font-size: 14px;
    }

    .btn-small {
      width: auto; padding: 4px 6px; font-size: 12px;
      margin-right: 4px; margin-top: 4px;
    }

    #workshop-list div {
      margin-bottom: 6px; border-bottom: 1px solid #eee; padding-bottom: 6px;
    }
  </style>
</head>
<body>

<div id="panel">
  <h2>HGV Workshop Finder</h2>

  <label>Breakdown postcode:</label>
  <input id="postcode" type="text" placeholder="e.g. LU7 3PQ">
  <button onclick="findWorkshops()">Search (20 nearest)</button>

  <hr>

  <label>Add / edit workshop</label>
  <input id="w-id" type="hidden">
  <input id="w-name" type="text" placeholder="Workshop name">
  <input id="w-lat" type="text" placeholder="Latitude">
  <input id="w-lng" type="text" placeholder="Longitude">

  <!-- CONTACT FIELDS -->
  <input id="w-phone-main" type="text" placeholder="Main phone">
  <input id="w-phone-mobile" type="text" placeholder="Mobile phone">
  <input id="w-phone-out" type="text" placeholder="Out of hours phone">
  <input id="w-email" type="text" placeholder="Email address">

  <button onclick="saveWorkshop()">Save workshop</button>
  <button onclick="clearWorkshopForm()">Clear form</button>

  <hr>

  <strong>Bulk import workshops</strong>
  <textarea id="bulk-input" placeholder="Name,lat,lng,main,mobile,out,email per line"></textarea>
  <button onclick="bulkImport()">Import</button>

  <hr>

  <strong>Current workshops</strong>
  <div id="workshop-list"></div>

  <button onclick="resetToDefaults()">Reset to default list</button>
</div>

<div id="map"></div>

<script>
let workshops = [];
let nextId = 1;

let map;
let workshopMarkers = [];
let breakdownMarker = null;

function loadWorkshops() {
  const stored = localStorage.getItem("hgv_workshops");
  if (stored) {
    try {
      const parsed = JSON.parse(stored);
      if (Array.isArray(parsed)) {
        workshops = parsed;
        nextId = workshops.length ? Math.max(...workshops.map(w => w.id)) + 1 : 1;
        return;
      }
    } catch (e) {}
  }
  workshops = [];
}

function saveWorkshopsToStorage() {
  localStorage.setItem("hgv_workshops", JSON.stringify(workshops));
}

function initMap() {
  loadWorkshops();

  map = new google.maps.Map(document.getElementById("map"), {
    center: { lat: 54.5, lng: -3 },
    zoom: 6,
  });

  renderWorkshopMarkers([]);
  renderWorkshopList([]);
}

function clearWorkshopMarkers() {
  workshopMarkers.forEach(m => m.setMap(null));
  workshopMarkers = [];
}

function renderWorkshopMarkers(list) {
  clearWorkshopMarkers();

  list.forEach(w => {
    const marker = new google.maps.Marker({
      position: { lat: w.lat, lng: w.lng },
      map,
      title: w.name,
      icon: "http://maps.google.com/mapfiles/ms/icons/green-dot.png"
    });

    const info = new google.maps.InfoWindow({
      content: `
        <strong>${w.name}</strong><br><br>
        <b>Main:</b> ${w.phoneMain || "N/A"}<br>
        <b>Mobile:</b> ${w.phoneMobile || "N/A"}<br>
        <b>Out of hours:</b> ${w.phoneOutHours || "N/A"}<br>
        <b>Email:</b> ${w.email || "N/A"}<br>
      `
    });

    marker.addListener("click", () => info.open(map, marker));

    workshopMarkers.push(marker);
  });
}

function renderWorkshopList(list) {
  const container = document.getElementById("workshop-list");
  container.innerHTML = "";

  list.forEach(w => {
    const div = document.createElement("div");
    div.innerHTML = `
      <strong>${w.name}</strong><br>
      Lat: ${w.lat}, Lng: ${w.lng}<br>
      <button class="btn-small" onclick="zoomToWorkshop(${w.id})">Zoom</button>
      <button class="btn-small" onclick="editWorkshop(${w.id})">Edit</button>
      <button class="btn-small" onclick="deleteWorkshop(${w.id})">Delete</button>
    `;
    container.appendChild(div);
  });
}

function zoomToWorkshop(id) {
  const w = workshops.find(x => x.id === id);
  if (!w) return;
  map.setCenter({ lat: w.lat, lng: w.lng });
  map.setZoom(15);
}

function editWorkshop(id) {
  const w = workshops.find(x => x.id === id);
  if (!w) return;

  document.getElementById("w-id").value = w.id;
  document.getElementById("w-name").value = w.name;
  document.getElementById("w-lat").value = w.lat;
  document.getElementById("w-lng").value = w.lng;

  document.getElementById("w-phone-main").value = w.phoneMain || "";
  document.getElementById("w-phone-mobile").value = w.phoneMobile || "";
  document.getElementById("w-phone-out").value = w.phoneOutHours || "";
  document.getElementById("w-email").value = w.email || "";
}

function clearWorkshopForm() {
  document.getElementById("w-id").value = "";
  document.getElementById("w-name").value = "";
  document.getElementById("w-lat").value = "";
  document.getElementById("w-lng").value = "";
  document.getElementById("w-phone-main").value = "";
  document.getElementById("w-phone-mobile").value = "";
  document.getElementById("w-phone-out").value = "";
  document.getElementById("w-email").value = "";
}

function saveWorkshop() {
  const idVal = document.getElementById("w-id").value.trim();
  const name = document.getElementById("w-name").value.trim();
  const lat = parseFloat(document.getElementById("w-lat").value.trim());
  const lng = parseFloat(document.getElementById("w-lng").value.trim());

  const phoneMain = document.getElementById("w-phone-main").value.trim();
  const phoneMobile = document.getElementById("w-phone-mobile").value.trim();
  const phoneOut = document.getElementById("w-phone-out").value.trim();
  const email = document.getElementById("w-email").value.trim();

  if (!name || isNaN(lat) || isNaN(lng)) {
    alert("Please enter a name, latitude and longitude.");
    return;
  }

  if (idVal) {
    const id = parseInt(idVal, 10);
    const idx = workshops.findIndex(w => w.id === id);
    if (idx !== -1) {
      workshops[idx] = {
        ...workshops[idx],
        name,
        lat,
        lng,
        phoneMain,
        phoneMobile,
        phoneOutHours: phoneOut,
        email
      };
    }
  } else {
    workshops.push({
      id: nextId++,
      name,
      lat,
      lng,
      phoneMain,
      phoneMobile,
      phoneOutHours: phoneOut,
      email
    });
  }

  clearWorkshopForm();
  saveWorkshopsToStorage();
}

function deleteWorkshop(id) {
  if (!confirm("Delete this workshop?")) return;
  workshops = workshops.filter(w => w.id !== id);
  saveWorkshopsToStorage();
}

function resetToDefaults() {
  if (!confirm("Reset to default workshop list?")) return;
  workshops = [];
  nextId = 1;
  saveWorkshopsToStorage();
}

function bulkImport() {
  const text = document.getElementById("bulk-input").value.trim();
  if (!text) {
    alert("Paste some workshop data first.");
    return;
  }

  const lines = text.split("\n");

  lines.forEach(line => {
    const parts = line.split(",");
    if (parts.length < 3) return;

    const name = parts[0].trim();
    const lat = parseFloat(parts[1].trim());
    const lng = parseFloat(parts[2].trim());

    const phoneMain = parts[3] ? parts[3].trim() : "";
    const phoneMobile = parts[4] ? parts[4].trim() : "";
    const phoneOut = parts[5] ? parts[5].trim() : "";
    const email = parts[6] ? parts[6].trim() : "";

    if (!name || isNaN(lat) || isNaN(lng)) return;

    workshops.push({
      id: nextId++,
      name,
      lat,
      lng,
      phoneMain,
      phoneMobile,
      phoneOutHours: phoneOut,
      email
    });
  });

  saveWorkshopsToStorage();
  alert("Bulk import complete.");
}

function haversine(lat1, lon1, lat2, lon2) {
  const R = 6371;
  const dLat = (lat2 - lat1) * Math.PI / 180;
  const dLon = (lat2 - lon1) * Math.PI / 180;
  const a =
    Math.sin(dLat / 2) ** 2 +
    Math.cos(lat1 * Math.PI / 180) *
    Math.cos(lat2 * Math.PI / 180) *
    Math.sin(dLon / 2) ** 2;
  const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
  return R * c;
}

function findWorkshops() {
  const postcode = document.getElementById("postcode").value.trim();
  if (!postcode) {
    alert("Enter a postcode.");
    return;
  }

  fetch(`https://maps.googleapis.com/maps/api/geocode/json?address=${encodeURIComponent(postcode)}&region=uk&key=AIzaSyB6p5E2vQ-PzafSR7wriDUZRLI1dgtN5o8`)
    .then(res => res.json())
    .then(data => {
      if (!data.results || !data.results.length) {
        alert("Postcode not found.");
        return;
      }

      const loc = data.results[0].geometry.location;

      if (breakdownMarker) breakdownMarker.setMap(null);
      breakdownMarker = new google.maps.Marker({
        position: loc,
        map,
        title: "Breakdown location",
        icon: "http://maps.google.com/mapfiles/ms/icons/red-dot.png"
      });

      map.setCenter(loc);
      map.setZoom(11);

      let sorted = workshops
        .map(w => ({
          ...w,
          distanceKm: haversine(loc.lat, loc.lng, w.lat, w.lng)
        }))
        .sort((a, b) => a.distanceKm - b.distanceKm)
        .slice(0, 20);

      renderWorkshopMarkers(sorted);
      renderWorkshopList(sorted);
    })
    .catch(() => alert("Geocoding failed."));
}
</script>

<script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyB6p5E2vQ-PzafSR7wriDUZRLI1dgtN5o8&callback=initMap" async defer></script>

</body>
</html>
